name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      TESTING: "1"
      SECRET_KEY: test_secret_key_only_for_ci
      DATABASE_URL: sqlite:///:memory:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements.txt

      - name: Run backend security tests
        run: python -m pytest backend/tests/test_security_isolation.py -v

  deploy:
    needs: tests
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_VM_ID }}
          username: root
          key: ${{ secrets.HOSTINGER_API_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          script: |
            set -e
            echo "🚀 Iniciando deploy..."
            
            cd /root/RomaneioRapido || cd ~/RomaneioRapido
            
            echo "📥 Atualizando código..."
            git fetch --all
            git reset --hard origin/main
            
            echo "🛑 Parando containers do projeto..."
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            
            echo "🧹 Limpando cache de build (Seguro para outras aplicações)..."
            # Builder prune limpa apenas cache de build, não remove outros containers/imagens em uso
            docker builder prune -p 24h -f || docker builder prune -f
            
            echo "🔨 Buildando containers..."
            docker compose -f docker-compose.prod.yml build --no-cache
            
            echo "🚀 Subindo novos containers..."
            docker compose -f docker-compose.prod.yml up -d
            
            echo "⏳ Aguardando serviços..."
            sleep 10
            
            echo "✅ Verificando status..."
            docker compose -f docker-compose.prod.yml ps
            
            echo "🎉 Deploy concluído!"
