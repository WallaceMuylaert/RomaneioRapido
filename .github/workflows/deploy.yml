name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      TESTING: "1"
      SECRET_KEY: test_secret_key_only_for_ci
      DATABASE_URL: sqlite:///./ci_test.sqlite
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r backend/requirements.txt

      - name: Run backend tests
        run: |
          for test_file in backend/tests/test_*.py; do
            echo "Running ${test_file}"
            python -m pytest "${test_file}" -v
          done

  deploy:
    needs: tests
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_VM_ID }}
          username: root
          key: ${{ secrets.HOSTINGER_API_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          script: |
            set -e
            echo "🚀 Iniciando deploy..."
            
            cd /root/RomaneioRapido || cd ~/RomaneioRapido
            
            echo "📥 Atualizando código..."
            git fetch --all
            git reset --hard origin/main
            
            echo "🛑 Parando containers do projeto..."
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            
            echo "🧹 Limpando cache de build (Seguro para outras aplicações)..."
            # Builder prune limpa apenas cache de build, não remove outros containers/imagens em uso
            docker builder prune -p 24h -f || docker builder prune -f
            
            echo "🔨 Buildando containers..."
            docker compose -f docker-compose.prod.yml build --no-cache
            
            echo "🚀 Subindo novos containers..."
            docker compose -f docker-compose.prod.yml up -d

            echo "⏳ Aguardando backend ficar saudável (até 60s)..."
            set +e
            backend_ready=false
            for i in $(seq 1 30); do
              docker compose -f docker-compose.prod.yml exec -T backend \
                python -c "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=2).read()" \
                >/dev/null 2>&1
              if [ $? -eq 0 ]; then
                backend_ready=true
                echo "  ✓ backend respondeu na tentativa $i"
                break
              fi
              sleep 2
            done
            set -e

            if [ "$backend_ready" = "false" ]; then
              echo "❌ Backend não respondeu em 60s — abortando deploy"
              echo "Logs do backend:"
              docker compose -f docker-compose.prod.yml logs --tail=80 backend
              exit 1
            fi

            echo "🔍 Rodando smoke-tests pós-deploy (pg_trgm, índices, plano de query)..."
            docker compose -f docker-compose.prod.yml exec -T backend \
              python -m backend.scripts.post_deploy_check

            echo "✅ Verificando status..."
            docker compose -f docker-compose.prod.yml ps

            echo "🎉 Deploy concluído!"
