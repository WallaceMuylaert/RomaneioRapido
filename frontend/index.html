      <h1>Romaneio Rápido — Sistema de Romaneio e Controle de Estoque</h1>
      <p>O <strong>Romaneio Rápido</strong> é uma plataforma web feita para pequenos negócios emitirem romaneios, controlarem estoque, registrarem movimentações e organizarem a separação de pedidos sem complicação.</p>

      <h2>Como funciona</h2>
      <ol>
        <li><strong>Bipe ou busque o produto:</strong> use leitor USB, câmera ou busca rápida para montar saídas sem digitação repetida.</li>
        <li><strong>Monte o romaneio:</strong> inclua quantidades, cliente e observações em uma tela simples e pronta para a operação.</li>
        <li><strong>Envie e mantenha histórico:</strong> gere romaneios profissionais e preserve o histórico mesmo quando produtos forem editados depois.</li>
      </ol>

      <h2>Recursos</h2>
      <ul>
        <li><strong>Controle de estoque em tempo real</strong> — produtos, categorias, unidades e mínimos sempre visíveis.</li>
        <li><strong>Dashboard de operação</strong> — entradas, saídas, saúde do estoque e itens críticos em um único painel.</li>
        <li><strong>Histórico confiável</strong> — snapshots de cada movimento para auditoria e rastreabilidade.</li>
        <li><strong>Rotina mais ágil</strong> — fluxos pensados para vender, separar e registrar sem travar a operação.</li>
        <li><strong>Suporte pelo WhatsApp</strong> — canal direto para tirar dúvidas e manter sua operação andando.</li>
        <li><strong>Cadastro completo</strong> — preço, foto, unidade, estoque mínimo e detalhes organizados por produto.</li>
      </ul>

      <h2>Planos a partir de R$99</h2>
      <p>Planos simples, com teste inicial e limites claros. Acesso 100% web. Opções para operações pequenas e em crescimento.</p>
