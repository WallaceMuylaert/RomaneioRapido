# ── Bloqueia qualquer host que não seja romaneiorapido.com.br ───────────────
server {
    listen 80 default_server;
    server_name _;
    return 444;   # fecha a conexão sem resposta (Nginx-only)
}

server {
    listen 80;
    server_name romaneiorapido.com.br www.romaneiorapido.com.br;

    root /usr/share/nginx/html;
    index index.html;

    # ── Segurança: ocultar versão do Nginx ──────────────────────────────────
    server_tokens off;

    # ── Limite de tamanho de corpo (10 MB) ──────────────────────────────────
    client_max_body_size 10m;

    # ── Headers de segurança ────────────────────────────────────────────────
    # Impede que o browser infira Content-Type (drive-by download / MIME sniffing)
    add_header X-Content-Type-Options    "nosniff"                        always;

    # Bloqueia carregamento em iframe de outros domínios (clickjacking)
    add_header X-Frame-Options           "DENY"                           always;

    # Força HTTPS por 1 ano (ative depois de ter HTTPS configurado)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Controle de referência — não vaza URL completa para terceiros
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Desativa funcionalidades perigosas do browser (câmera permitida para o próprio domínio)
    add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=(), payment=()" always;

    # Content-Security-Policy — ajuste os domínios conforme necessário
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Proxy /api/* → backend (remove o prefixo /api) ──────────────────────
    location /api/ {
        # Bloqueia métodos não utilizados
        limit_except GET POST PUT DELETE OPTIONS {
            deny all;
        }

        proxy_pass         http://backend:8002/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Não repassa headers internos de infra para o cliente
        proxy_hide_header  X-Powered-By;
        proxy_hide_header  Server;
    }

    # ── Serve SPA — redireciona todas as rotas para index.html ──────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Cache de assets estáticos com hash no nome
        location ~* \.(js|css|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── Bloqueia acesso a arquivos ocultos (.env, .git, etc.) ───────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
