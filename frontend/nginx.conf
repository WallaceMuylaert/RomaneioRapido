# ── Bloqueia qualquer host que não seja romaneiorapido.com.br ───────────────
server {
    listen 80 default_server;
    server_name _;
    return 444;   # fecha a conexão sem resposta (Nginx-only)
}

server {
    listen 80;
    server_name romaneiorapido.com.br www.romaneiorapido.com.br;

    root /usr/share/nginx/html;
    index index.html;

    # ── Segurança: ocultar versão do Nginx ──────────────────────────────────
    server_tokens off;

    # ── Limite de tamanho de corpo (10 MB) ──────────────────────────────────
    client_max_body_size 10m;

    # ── Compressão Gzip (Core Web Vitals / SEO) ─────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/xml
        application/xml+rss
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # ── Headers de segurança no nível server (aplicados onde NÃO há add_header local) ──
    # Aviso: nginx não herda add_header em locations que declaram seus próprios headers.
    # Por isso os locations abaixo que precisam de Cache-Control próprio repetem TODOS os headers.
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header X-Frame-Options           "DENY"                              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=(), payment=()" always;
    # CSP libera o JSON-LD inline via hash SHA-256 (recomputar se o bloco mudar — ver index.html)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-qWRpiH5teuEKuscQtj04nxt4gvsOFAAXBLC+lNC9Ucs='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── SEO: robots.txt e sitemap.xml ───────────────────────────────────────
    location = /robots.txt {
        access_log off;
        log_not_found off;
        # Repetir todos os headers de segurança (gotcha nginx)
        add_header X-Content-Type-Options    "nosniff"                           always;
        add_header X-Frame-Options           "DENY"                              always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-qWRpiH5teuEKuscQtj04nxt4gvsOFAAXBLC+lNC9Ucs='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control             "public, max-age=3600";
    }

    location = /sitemap.xml {
        types { } default_type "application/xml; charset=utf-8";
        access_log off;
        add_header X-Content-Type-Options    "nosniff"                           always;
        add_header X-Frame-Options           "DENY"                              always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-qWRpiH5teuEKuscQtj04nxt4gvsOFAAXBLC+lNC9Ucs='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control             "public, max-age=3600";
    }

    location = /site.webmanifest {
        types { } default_type "application/manifest+json; charset=utf-8";
        add_header X-Content-Type-Options    "nosniff"                           always;
        add_header X-Frame-Options           "DENY"                              always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-qWRpiH5teuEKuscQtj04nxt4gvsOFAAXBLC+lNC9Ucs='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control             "public, max-age=86400";
    }

    location = /favicon.svg {
        types { } default_type "image/svg+xml";
        access_log off;
        add_header X-Content-Type-Options    "nosniff"                           always;
        add_header X-Frame-Options           "DENY"                              always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-qWRpiH5teuEKuscQtj04nxt4gvsOFAAXBLC+lNC9Ucs='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control             "public, max-age=604800";
    }

    # ── Proxy /api/* → backend (remove o prefixo /api) ──────────────────────
    location /api/ {
        # Bloqueia métodos não utilizados
        limit_except GET POST PUT DELETE OPTIONS {
            deny all;
        }

        proxy_pass         http://backend:8002/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Não repassa headers internos de infra para o cliente
        proxy_hide_header  X-Powered-By;
        proxy_hide_header  Server;
    }

    # ── Assets estáticos com hash no nome (cacheáveis por 1 ano) ────────────
    # Declarado FORA do location / para evitar a herança parcial de add_header.
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|webp|avif)$ {
        access_log off;
        add_header X-Content-Type-Options    "nosniff"                           always;
        add_header X-Frame-Options           "DENY"                              always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy        "camera=(self), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-qWRpiH5teuEKuscQtj04nxt4gvsOFAAXBLC+lNC9Ucs='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control             "public, max-age=31536000, immutable";
    }

    # ── Serve SPA — tenta rota estática (prerender) antes do fallback ───────
    # Sem add_header próprio aqui → herda os headers de segurança do server.
    location / {
        try_files $uri $uri/index.html $uri/ /index.html;
    }

    # ── Bloqueia acesso a arquivos ocultos (.env, .git, etc.) ───────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
